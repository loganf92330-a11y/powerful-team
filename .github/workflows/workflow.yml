name: Daily Commit

on:
  schedule:
    - cron: "0 9 * * *"   # every day at 9 AM

jobs:
  commit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Make a change
        run: |
          echo "Update $(date)" >> log.txt
      - name: Commit
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"
          git add .
          git commit -m "Automated update"
          git push
